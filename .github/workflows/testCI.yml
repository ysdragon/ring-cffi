name: Test CI
on:
  push:
    branches: [ master ]
    paths:
      - 'src/cffi.ring'
      - 'test/CFFI_test.ring'
      - '.github/workflows/testCI.yml'

jobs:
  test:
    strategy:
      matrix:
        os: [ macos-latest, ubuntu-latest, ubuntu-24.04-arm, windows-latest ]
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v6

    - name: Run tests
      uses: ysdragon/ring-action@v1
      with:
        file: "test/CFFI_test.ring"
