name: Test CI
on:
  push:
    branches: [ master ]
    paths:
      - '**.ring'
      - '.github/workflows/testCI.yml'
  workflow_run:
    workflows: ["Build and Update"]
    types:
      - completed

jobs:
  check-c-changes:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      should-run: ${{ steps.filter.outputs.should-run }}
    steps:
    - uses: actions/checkout@v4
    - id: filter
      run: |
        if git diff --name-only HEAD~1 HEAD | grep -qE '\.(c|h)$'; then
          echo "should-run=false" >> "$GITHUB_OUTPUT"
        else
          echo "should-run=true" >> "$GITHUB_OUTPUT"
        fi

  test:
    needs: [check-c-changes]
    if: ${{ (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') || (github.event_name == 'push' && needs.check-c-changes.outputs.should-run == 'true') }}
    strategy:
      matrix:
        os: [ macos-latest, ubuntu-latest, ubuntu-24.04-arm, windows-latest ]
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ github.event.workflow_run.head_branch || github.ref }}

    - name: Run tests
      uses: ysdragon/ring-action@v1
      with:
        file: "test/CFFI_test.ring"
